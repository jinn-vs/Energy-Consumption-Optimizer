<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Appliance - Energy Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 450px;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
        }

        .container h2 span {
            color: #00e676;
        }

        .subtitle {
            text-align: center;
            color: #90a4ae;
            font-size: 14px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #b0bec5;
            margin-bottom: 5px;
            margin-top: 15px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #00e676;
        }

        input::placeholder {
            color: #546e7a;
        }

        select option {
            background: #1a2a33;
            color: #fff;
        }

        .quick-add {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 230, 118, 0.05);
            border: 1px solid rgba(0, 230, 118, 0.15);
            border-radius: 12px;
        }

        .quick-add p {
            font-size: 13px;
            color: #00e676;
            margin-bottom: 10px;
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #cfd8dc;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: #00e676;
            color: #0f2027;
            border-color: #00e676;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #00e676;
            color: #0f2027;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
        }

        button[type="submit"]:hover {
            background: #00c853;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #90a4ae;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: #00e676;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔌 <span>Appliance</span> Add Karo</h2>
        <p class="subtitle">Apne ghar ka koi bhi bijli ka saman add karo</p>

        <div class="quick-add">
            <p>⚡ Quick Add (click karo, form bhar jayega):</p>
            <div class="quick-buttons">
                <button type="button" class="quick-btn" onclick="fillForm('AC (1.5 Ton)', 1500, 8, 'Cooling')">AC
                    1.5T</button>
                <button type="button" class="quick-btn" onclick="fillForm('AC (1 Ton)', 1000, 8, 'Cooling')">AC
                    1T</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('Ceiling Fan', 75, 12, 'Cooling')">Fan</button>
                <button type="button" class="quick-btn" onclick="fillForm('LED Bulb', 12, 8, 'Lighting')">LED
                    Bulb</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('Refrigerator', 150, 24, 'Kitchen')">Fridge</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('Washing Machine', 500, 1, 'Laundry')">Washer</button>
                <button type="button" class="quick-btn" onclick="fillForm('Iron', 1000, 0.5, 'Laundry')">Iron</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('TV (LED 40in)', 80, 5, 'Entertainment')">TV</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('Water Heater', 1500, 1, 'Kitchen')">Geyser</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('Microwave', 1200, 0.5, 'Kitchen')">Microwave</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('Computer/Laptop', 100, 6, 'Office')">Computer</button>
                <button type="button" class="quick-btn"
                    onclick="fillForm('WiFi Router', 15, 24, 'Office')">Router</button>
            </div>
        </div>

        <form method="POST">
            <label>Appliance ka Naam</label>
            <input type="text" name="name" id="app_name" placeholder="e.g. AC, Fan, Fridge" required>

            <label>Wattage (Watts)</label>
            <input type="number" name="wattage" id="app_wattage" placeholder="e.g. 1500" required>

            <label>Kitne Ghantay Chalta Hai (per din)</label>
            <input type="number" step="0.5" name="avg_hours_per_day" id="app_hours" placeholder="e.g. 8" required>

            <label>Category</label>
            <select name="category" id="app_category">
                <option value="Cooling">Cooling (AC, Fan)</option>
                <option value="Lighting">Lighting (Bulbs)</option>
                <option value="Kitchen">Kitchen (Fridge, Microwave)</option>
                <option value="Laundry">Laundry (Washer, Iron)</option>
                <option value="Entertainment">Entertainment (TV)</option>
                <option value="Office">Office (Computer)</option>
                <option value="General">General</option>
            </select>

            <button type="submit">Add Karo →</button>
        </form>

        <div class="back-link">
            <a href="/dashboard">← Dashboard pe wapas jao</a>
        </div>
    </div>

    <script>
        function fillForm(name, wattage, hours, category) {
            document.getElementById('app_name').value = name;
            document.getElementById('app_wattage').value = wattage;
            document.getElementById('app_hours').value = hours;
            document.getElementById('app_category').value = category;
        }
    </script>
</body>

</html>
